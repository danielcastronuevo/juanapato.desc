<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juanapatos — Preventa</title>
  <link rel="stylesheet" href="../assets/styles.css">
</head>
<body>

  <div class="banner" style="background:linear-gradient(145deg,#1c1c1e 0%,#000 100%)">
    <div class="banner__dot banner__dot--a" style="background:rgba(255,255,255,0.04)"></div>
    <div class="banner__dot banner__dot--b" style="background:rgba(255,255,255,0.03)"></div>

    <div class="banner__badge" style="font-size:0.85rem;letter-spacing:2.5px;padding:0.35rem 1.1rem;color:#000">
      PREVENTA
    </div>

    <div class="banner__title">Precio de lanzamiento</div>

    <div class="preventa-divider"></div>

    <ul class="preventa-list">
      <li>Comprás hoy al precio más bajo</li>
      <li>Reservás tu par antes que nadie</li>
      <li>Lo recibís cuando llegue el stock</li>
    </ul>

    <p class="banner__aviso">⚠ Stock limitado · El precio sube después de la preventa</p>
  </div>

  <script src="../assets/resize.js"></script>
</body>
</html>
