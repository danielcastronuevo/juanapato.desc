<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juanapatos — Pago y envío</title>
  <link rel="stylesheet" href="../assets/styles.css">
</head>
<body>

  <div class="sec-label">Pago y envío</div>

  <div class="info-item">
    <svg class="info-item__ico" viewBox="0 0 24 24">
      <rect x="1" y="4" width="22" height="16" rx="2"/>
      <line x1="1" y1="10" x2="23" y2="10"/>
    </svg>
    <div>
      <span class="info-item__strong">Hasta 6 cuotas sin interés</span>
      <span class="info-item__sub">Con todas las tarjetas de crédito</span>
    </div>
  </div>

  <div class="info-item">
    <svg class="info-item__ico" viewBox="0 0 24 24">
      <line x1="3" y1="22" x2="21" y2="22"/>
      <line x1="6" y1="18" x2="6" y2="11"/>
      <line x1="10" y1="18" x2="10" y2="11"/>
      <line x1="14" y1="18" x2="14" y2="11"/>
      <line x1="18" y1="18" x2="18" y2="11"/>
      <polygon points="12 2 20 7 4 7"/>
    </svg>
    <div>
      <span class="info-item__strong">15% OFF con transferencia bancaria</span>
      <span class="info-item__sub">Descuento al abonar por transferencia o CBU/CVU</span>
    </div>
  </div>

  <div class="info-item">
    <svg class="info-item__ico" viewBox="0 0 24 24">
      <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
      <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
      <line x1="12" y1="22.08" x2="12" y2="12"/>
    </svg>
    <div>
      <span class="info-item__strong">Envío gratis a todo el país</span>
      <span class="info-item__sub">Entrega en 3 a 7 días hábiles</span>
    </div>
  </div>

  <div class="info-item">
    <svg class="info-item__ico" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/>
      <line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <div>
      <span class="info-item__strong">Seguimiento del envío por mail</span>
      <span class="info-item__sub">Correo Argentino y paquetería e-commerce</span>
    </div>
  </div>

  <script src="../assets/resize.js"></script>
</body>
</html>
